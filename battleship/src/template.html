<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="header">
        <h1>Battleship</h1>
        <p id="status" class="status">Attack Your Oponnent's Board to Begin</p>
    </div>
    <div class="boards">
        <div class="boardColumn">
            <div id="playerBoard" class="board"></div>
            <p>Player</p>
        </div>

        <div id="computerColumn" class="hidden">
            <div id="computerBoard" class="board"></div>
            <p>Computer</p>
        </div>

        <div id="shipSelector" class="shipColumn">
            <div id="shipDisplay"></div>
            <button id="rotateShip" class="rotateShip">rotate</button>
            <p>Click the square you want to place the ship on!</p>
            <p>The highlighted square will be the one placed where you click</p>
        </div>
    </div>
</body>

</html>
