<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <dialog id="todoMenu">
        <label for="title">Title:</label>
        <input type="text" name="title" id="todoTitle">

        <label for="description">Description:</label>
        <input type="text" name="description" id="description">

        <label for="date">Due-Date:</label>
        <input type="date" name="date" id="date">

        <label for="priority">Priority Level:</label>
        <select name="priority" id="priority">
            <option value="high">high</option>
            <option value="medium">medium</option>
            <option value="low">low</option>
        </select>
        

        <button id="submitTodo">Add todo!</button>
    </dialog>

    <dialog id="projectMenu">
        <label for="title">Title:</label>
        <input type="text" name="title" id="projectTitle">        

        <button id="submitProject">Update project!</button>
    </dialog>

    <dialog id="deleteMenu">
        <p>Are you sure you want to <em>permanently</em> delete this?</p>
        <button id="confirmDelete">Confirm</button>
        <button id="cancelDelete">Cancel</button>
    </dialog>

    <div id="header">
        <button id="createProject">Create New Project</button>
    </div>

    <div id="projects" class="projects"></div>

    <script src="index.js"></script>
</body>
</html>
