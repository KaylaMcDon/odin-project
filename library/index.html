<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <form id="form" novalidate>
        <label for="title">Title:</label>
        <input type="text" name="title" id="title" required>

        <label for="name">Authors name:</label>
        <input type="text" name="name" id="name" required>

        <label for="pageNum">Page Number:</label>
        <input type="number" name="pageNum" id="pageNum" required>

        <label for="read">Have you read it already?</label>
        <select name="read" id="read" required>
            <option value="true">yes</option>
            <option value="false">no</option>
        </select>

        <button type="submit" id="submit">Add To Library</button>
    </form>
    <div class="cardContainer" id="cardContainer"></div>

    <script src="scripts.js"></script>
</body>

</html>
