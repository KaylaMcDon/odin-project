<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
</head>

<body>
    <div class="header">
        <label for="location"></label>
        <input type="text" name="location" id="location">

        <button id="locationButton">Search Weather</button>
    </div>

    <div id="weather" class="cardContainer">
        <h2 class="hidden">Current Conditions</h2>
        <div id="currentCard">
            <p id="currentConditions"></p>
            <p id="currentTemp"></p>
        </div>
        <h2 class="hidden">Hourly Report</h2>
        <div id="hourly" class="cardContainer"></div>
        <h2 class="hidden">Daily Report</h2>
        <div id="daily" class="cardContainer"></div>
    </div>
</body>

</html>
